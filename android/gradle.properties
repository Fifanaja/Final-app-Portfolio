# 🚀 1. อัด RAM 6GB + ฝังชิปอเมริกาแก้บั๊กปฏิทินไทย (กัน VerifyException)
org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Duser.country=US -Duser.language=en

# 🤖 2. ระบบมาตรฐานของ Android รุ่นใหม่ (Flutter บังคับใช้)
android.useAndroidX=true
android.enableJetifier=true

# ⚡ 3. เปิดสวิตช์เทอร์โบให้รันเต็มสปีด (เปลี่ยนจาก false เป็น true ให้หมด!)
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.caching=true
kotlin.incremental=true